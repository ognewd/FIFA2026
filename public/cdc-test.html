<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CDC Test — Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
h1{font-size:20px;font-weight:700;color:#5eead4;margin-bottom:6px}
p{font-size:12px;color:#8892a4;margin-bottom:16px}
.sirvis-btn{display:inline-block;margin-bottom:24px;padding:10px 24px;background:#5eead4;color:#000;border-radius:8px;font-size:14px;font-weight:700;text-decoration:none}
.sirvis-btn:hover{opacity:.85}
#gigya-container{width:100%;max-width:440px}
#dbg{margin-top:12px;font-size:11px;color:#8892a4;text-align:center;min-height:16px}
</style>
<script type="text/javascript" src="https://cdns.eu1.gigya.com/js/gigya.js?apikey=4_1UqidRHbT3TrcmWly5oVKg"></script>
</head>
<body>
  <h1>CDC Login Test</h1>
  <p>Screen Set: CCH-RegistrationLogin-SSO · eu1</p>
  <a class="sirvis-btn" href="https://730626274822.eu1.my.gigya-ext.com/pages/sirvis-login" target="_blank">Sirvis Login →</a>
  <div id="gigya-container"></div>
  <div id="dbg"></div>

  <script>
    var dbg = document.getElementById('dbg');
    function log(msg) { dbg.textContent = msg; console.log('[CDC]', msg); }

    function onGigyaServiceReady() {
      var params = new URLSearchParams(window.location.search);
      var context = params.get('context');

      if (context) {
        log('OIDC context detected — checking session…');
        gigya.accounts.getAccountInfo({
          callback: function(res) {
            if (res.errorCode === 0) {
              // Active session: re-authenticate silently by logging out first,
              // then CDC will redirect after re-login via the screen set
              log('Active session — logging out to allow OIDC re-auth…');
              gigya.accounts.logout({
                callback: function() {
                  log('Logged out — showing login form');
                  showScreenSet(context);
                }
              });
            } else {
              log('No session — showing login form');
              showScreenSet(context);
            }
          }
        });
      } else {
        showScreenSet(null);
      }
    }

    function showScreenSet(context) {
      // Pass context so CDC SDK knows this is an OIDC login flow
      // and handles the redirect to finalizeOidcLogin with auth code automatically
      var opts = {
        screenSet: 'CCH-RegistrationLogin-SSO',
        containerID: 'gigya-container',
        onLogin: function(res) {
          log('Login OK — CDC should redirect…');
          console.log('[CDC] onLogin response:', res);
        }
      };
      if (context) opts.context = context;
      gigya.accounts.showScreenSet(opts);
    }
  </script>
</body>
</html>
